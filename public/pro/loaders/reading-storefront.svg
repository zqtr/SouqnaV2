<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="svg-bloom" x="-100%" y="-100%" width="300%" height="300%">
      <feComponentTransfer in="SourceGraphic" result="bright">
        <feFuncR type="linear" slope="4.50" intercept="-1.80"/>
        <feFuncG type="linear" slope="4.50" intercept="-1.80"/>
        <feFuncB type="linear" slope="4.50" intercept="-1.80"/>
      </feComponentTransfer>
      <feGaussianBlur in="bright" stdDeviation="4.0" result="bloomSmall"/>
      <feGaussianBlur in="bright" stdDeviation="8.0" result="bloomLarge"/>
      <feMerge result="bloomMerge">
        <feMergeNode in="bloomLarge"/>
        <feMergeNode in="bloomSmall"/>
      </feMerge>
      <feBlend in="SourceGraphic" in2="bloomMerge" mode="screen"/>
    </filter>
  </defs>
